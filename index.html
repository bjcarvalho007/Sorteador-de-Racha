<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUT•PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .team-card { transition: all 0.2s ease; }
        
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
            animation-delay: 2.5s;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translate(-50%, 0); }
            to { opacity: 0; transform: translate(-50%, 20px); }
        }

        .dragging {
            opacity: 0.5;
            transform: scale(1.02);
            border-color: #f59e0b !important;
            background-color: #fffbeb !important;
        }
        
        .drop-target {
            border-top: 4px solid #f59e0b !important;
        }

        .pos-input {
            width: 45px;
            text-align: center;
            border: 2px solid #f59e0b;
            border-radius: 8px;
            font-weight: 900;
            color: #b45309;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .timer-float {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .playing-pulse-green {
            animation: pulse-green 2s infinite;
        }
        .playing-pulse-blue {
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const generateId = () => Date.now().toString(36) + Math.random().toString(36).substring(2);

        const Icons = {
            Trophy: ({ size = 24, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
            ),
            Users: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ),
            X: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            ),
            Plus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Minus: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            ),
            Shuffle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22"/><path d="m18 2 4 4-4 4"/><path d="M2 6h1.9c1.5 0 2.9.9 3.6 2.2"/><path d="M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8"/><path d="m18 14 4 4-4 4"/></svg>
            ),
            List: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            ),
            Layout: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
            ),
            Shield: ({ size = 16, className = "" }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
            ),
            ArrowUp: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            ),
            ArrowDown: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 12-7 7-7-7"/><path d="M12 5v14"/></svg>
            ),
            ArrowDoubleUp: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 10 7-7 7 7"/><path d="m5 17 7-7 7 7"/></svg>
            ),
            Grip: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-slate-300"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
            ),
            Play: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            ),
            Pause: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            ),
            Info: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            ),
            RotateCcw: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            ),
            AlertTriangle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            ),
            CheckCircle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            ),
            Activity: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ),
            Clock: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            )
        };

        const App = () => {
            const [players, setPlayers] = useState([]); 
            const [goalkeepers, setGoalkeepers] = useState([]); 
            const [newPlayerName, setNewPlayerName] = useState('');
            const [playersPerTeam, setPlayersPerTeam] = useState(5);
            const [bulkText, setBulkText] = useState('');
            const [showBulkInput, setShowBulkInput] = useState(false);
            const [hasGoalkeepers, setHasGoalkeepers] = useState(null); 
            const [teams, setTeams] = useState([]);
            const [activeTab, setActiveTab] = useState('players'); 
            const [error, setError] = useState('');
            const [lastMethod, setLastMethod] = useState(''); 
            const [isManipulatingOrder, setIsManipulatingOrder] = useState(false);
            const [editingPosId, setEditingPosId] = useState(null);

            const [selectedTime, setSelectedTime] = useState(10);
            const [timeLeft, setTimeLeft] = useState(10 * 60);
            const [timerActive, setTimerActive] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [showMatchResultModal, setShowMatchResultModal] = useState(false);
            
            const dragItem = useRef();
            const dragOverItem = useRef();

            const teamStats = useMemo(() => {
                const totalPlayers = players.length;
                const complete = Math.floor(totalPlayers / playersPerTeam);
                const remainder = totalPlayers % playersPerTeam;
                return {
                    total: players.length + goalkeepers.length,
                    gks: goalkeepers.length,
                    complete,
                    incomplete: remainder > 0 ? 1 : 0,
                    needed: (playersPerTeam - remainder) % playersPerTeam
                };
            }, [players, goalkeepers, playersPerTeam]);

            useEffect(() => {
                if (error) {
                    const timer = setTimeout(() => {
                        setError('');
                    }, 3000);
                    return () => clearTimeout(timer);
                }
            }, [error]);

            useEffect(() => {
                let interval = null;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0 && timerActive) {
                    setTimerActive(false);
                    setShowMatchResultModal(true);
                    if (window.navigator.vibrate) window.navigator.vibrate([200, 100, 200]);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            const resetTimer = () => {
                setTimeLeft(selectedTime * 60);
                setTimerActive(false);
            };

            const handleTimeSelect = (t) => {
                setSelectedTime(t);
                setTimeLeft(t * 60);
                setTimerActive(false);
            };

            const cleanPlayerName = (name) => {
                return name
                    .replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{1F900}-\u{1F9FF}\u{1F1E6}-\u{1F1FF}\u{1F170}-\u{1F19A}]/gu, '')
                    .replace(/^\s*\d+[\s.\-)\s]*/, '')
                    .replace(/\(GK\)|\(GL\)|GOLEIRO|GK|GL|GOLEIROS|GOLEIRO:/gi, '')
                    .replace(/\[\d{2}:\d{2}\]|~|@/g, '')
                    .replace(/^[\s\-\.\:\u2000-\u206F\u2E00-\u2E7F\\'!"#$%&()*+,\/;<=>?@\[\]^_`{|}~]*/, '')
                    .trim();
            };

            const addPlayer = (e) => {
                e.preventDefault();
                if (!newPlayerName.trim()) return;
                const cleanedName = cleanPlayerName(newPlayerName);
                if (!cleanedName || cleanedName.length < 2) return;
                setPlayers(prev => [...prev, { id: generateId(), name: cleanedName }]);
                setNewPlayerName('');
            };

            const importFromWhatsApp = () => {
                if (!bulkText.trim()) return;
                const lines = bulkText.split('\n');
                const newPlayers = [];
                const blacklist = ['ATENÇÃO', 'HORÁRIO', 'HOJE', 'ARENA', 'DETRAN', 'OBS:', 'PATROCINADO', 'DIVIDIDO', 'LISTA RESERVA', 'DESISTÊNCIA', 'SEQUÊNCIA', 'PRINCIPAL', 'LANÇAREMOS', 'CASO', 'RESTANTE', 'LISTA', 'PAGOU', 'CONFIRMADOS', 'VALOR', 'PIX', 'TAXA', 'MENSALISTA'];

                lines.forEach((line) => {
                    const upperLine = line.toUpperCase().trim();
                    if (!upperLine || upperLine.length < 2) return;
                    if (blacklist.some(word => upperLine.includes(word))) return;
                    const cleanedName = cleanPlayerName(line);
                    if (cleanedName && cleanedName.length >= 2 && /[a-zA-Zá-úÁ-Ú]/.test(cleanedName)) {
                        if (!newPlayers.some(p => p.name.toLowerCase() === cleanedName.toLowerCase())) {
                            newPlayers.push({ id: generateId() + Math.random(), name: cleanedName });
                        }
                    }
                });

                if (newPlayers.length > 0) {
                    setPlayers(prev => [...prev, ...newPlayers]);
                    setBulkText('');
                    setShowBulkInput(false);
                } else {
                    setError("Nenhum nome válido encontrado.");
                }
            };

            const toggleToGk = (player) => {
                setPlayers(prev => prev.filter(p => p.id !== player.id));
                setGoalkeepers(prev => [...prev, player]);
            };

            const toggleToLine = (gk) => {
                setGoalkeepers(prev => prev.filter(p => p.id !== gk.id));
                setPlayers(prev => [...prev, gk]);
            };

            const removePlayer = (id, type) => {
                if (type === 'gk') setGoalkeepers(prev => prev.filter(p => p.id !== id));
                else setPlayers(prev => prev.filter(p => p.id !== id));
            };

            const movePlayer = (index, direction) => {
                const newPlayers = [...players];
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= newPlayers.length) return;
                [newPlayers[index], newPlayers[targetIndex]] = [newPlayers[targetIndex], newPlayers[index]];
                setPlayers(newPlayers);
            };

            const movePlayerToTop = (index) => {
                const newPlayers = [...players];
                const player = newPlayers.splice(index, 1)[0];
                newPlayers.unshift(player);
                setPlayers(newPlayers);
            };

            const movePlayerToPos = (fromIndex, toPosStr) => {
                const toIndex = parseInt(toPosStr) - 1;
                if (isNaN(toIndex) || toIndex < 0 || toIndex >= players.length || toIndex === fromIndex) {
                    setEditingPosId(null);
                    return;
                }
                const newPlayers = [...players];
                const [player] = newPlayers.splice(fromIndex, 1);
                newPlayers.splice(toIndex, 0, player);
                setPlayers(newPlayers);
                setEditingPosId(null);
            };

            const handleDragStart = (e, index) => {
                dragItem.current = index;
                e.currentTarget.classList.add('dragging');
            };

            const handleDragEnter = (e, index) => {
                dragOverItem.current = index;
                e.currentTarget.classList.add('drop-target');
            };

            const handleDragLeave = (e) => e.currentTarget.classList.remove('drop-target');

            const handleDragEnd = (e) => {
                e.currentTarget.classList.remove('dragging');
                const newPlayers = [...players];
                const draggedItemContent = newPlayers.splice(dragItem.current, 1)[0];
                newPlayers.splice(dragOverItem.current, 0, draggedItemContent);
                dragItem.current = null;
                dragOverItem.current = null;
                setPlayers(newPlayers);
                document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
            };

            const generateTeams = (randomize = true) => {
                setError('');
                if (players.length < playersPerTeam) {
                    setError(`Precisas de pelo menos ${playersPerTeam} jogadores.`);
                    return;
                }
                setLastMethod(randomize ? 'random' : 'order');
                setIsManipulatingOrder(false);
                let playerPool = randomize ? [...players].sort(() => Math.random() - 0.5) : [...players]; 
                const numTeams = Math.ceil(players.length / playersPerTeam);
                const generatedTeams = [];
                
                for (let i = 0; i < numTeams; i++) {
                    const teamMembers = [];
                    for (let j = 0; j < playersPerTeam; j++) {
                        if (playerPool.length > 0) teamMembers.push(playerPool.shift());
                    }
                    generatedTeams.push({ 
                        id: `team-${generateId()}`, 
                        name: `Equipe ${i + 1}`, 
                        members: teamMembers,
                        isComplete: teamMembers.length === playersPerTeam
                    });
                }
                setTeams(generatedTeams);
            };

            const updateTeamNames = (currentTeams) => {
                return currentTeams.map((team, index) => ({
                    ...team,
                    name: `Equipe ${index + 1}`
                }));
            };

            const concludeMatch = (winnerIndex) => {
                const loserIndex = winnerIndex === 0 ? 1 : 0;
                let currentTeams = [...teams];
                
                const winnerTeam = { ...currentTeams[winnerIndex] };
                const loserTeam = { ...currentTeams[loserIndex] };

                currentTeams.splice(0, 2);
                currentTeams.unshift(winnerTeam);

                let playersToQueue = [...loserTeam.members];
                
                if (currentTeams.length > 0) {
                    const lastTeamIndex = currentTeams.length - 1;
                    const lastTeam = { ...currentTeams[lastTeamIndex] };
                    const vacancies = playersPerTeam - lastTeam.members.length;
                    
                    if (vacancies > 0) {
                        const filling = playersToQueue.splice(0, vacancies);
                        lastTeam.members = [...lastTeam.members, ...filling];
                        currentTeams[lastTeamIndex] = lastTeam;
                    }
                }

                while (playersToQueue.length > 0) {
                    const nextBatch = playersToQueue.splice(0, playersPerTeam);
                    currentTeams.push({
                        id: generateId(),
                        name: "",
                        members: nextBatch
                    });
                }

                setTeams(updateTeamNames(currentTeams));
                resetTimer();
                setShowMatchResultModal(false);
            };

            const concludeEmpate = () => {
                let currentTeams = [...teams];
                const teamA = currentTeams.shift();
                const teamB = currentTeams.shift();
                let pool = [...teamA.members, ...teamB.members];

                if (currentTeams.length > 0) {
                    const lastTeamIndex = currentTeams.length - 1;
                    const lastTeam = { ...currentTeams[lastTeamIndex] };
                    const vacancies = playersPerTeam - lastTeam.members.length;
                    if (vacancies > 0) {
                        const filling = pool.splice(0, vacancies);
                        lastTeam.members = [...lastTeam.members, ...filling];
                        currentTeams[lastTeamIndex] = lastTeam;
                    }
                }

                while (pool.length > 0) {
                    const nextBatch = pool.splice(0, playersPerTeam);
                    currentTeams.push({
                        id: generateId(),
                        name: "",
                        members: nextBatch
                    });
                }

                setTeams(updateTeamNames(currentTeams));
                resetTimer();
                setShowMatchResultModal(false);
            };

            const resetEverything = () => {
                setPlayers([]);
                setGoalkeepers([]);
                setTeams([]);
                setHasGoalkeepers(null);
                setTimerActive(false);
                setTimeLeft(selectedTime * 60);
                setShowResetConfirm(false);
                setActiveTab('players');
            };

            const updatePlayersPerTeam = (delta) => {
                const newVal = playersPerTeam + delta;
                if (newVal >= 2 && newVal <= 11) setPlayersPerTeam(newVal);
            };

            return (
                <div className="min-h-screen pb-24">
                    {/* CABEÇALHO DASHBOARD */}
                    <header className="bg-slate-900 text-white pt-6 pb-8 px-4 shadow-2xl border-b-4 border-green-600 mb-6">
                        <div className="max-w-4xl mx-auto space-y-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="p-2 bg-green-600 rounded-xl shadow-lg shadow-green-900/20">
                                        <Icons.Trophy size={28} className="text-white" />
                                    </div>
                                    <div>
                                        <h1 className="text-2xl font-black uppercase italic tracking-tighter text-white leading-none">FUT•PRO</h1>
                                        <p className="text-[9px] font-black uppercase tracking-[0.3em] text-green-500 mt-1">Organização em seus jogos</p>
                                    </div>
                                </div>
                                <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-slate-800 rounded-full border border-slate-700">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Sistema Online</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <div className="bg-slate-800/50 p-4 rounded-2xl border border-slate-700/50 backdrop-blur-sm">
                                    <div className="flex items-center justify-between mb-1">
                                        <Icons.Users />
                                        <span className="text-xl font-black text-white">{teamStats.total}</span>
                                    </div>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Total Atletas</p>
                                </div>

                    )}

                    {activeTab !== 'match' && timerActive && (
                        <div onClick={() => setActiveTab('match')} className="timer-float fixed bottom-24 right-6 bg-slate-900 text-white pl-4 pr-3 py-3 rounded-2xl shadow-2xl flex items-center gap-3 border border-slate-700 z-[45] cursor-pointer hover:bg-slate-800 transition-all active:scale-95 shadow-green-500/20">
                            <div className="flex flex-col"><span className="text-[7px] font-black uppercase text-slate-500 tracking-tighter italic">Tempo de Jogo</span><span className="text-xl font-black italic text-green-400 leading-none tabular-nums">{formatTime(timeLeft)}</span></div>
                            <div className="w-8 h-8 rounded-xl bg-green-600/20 flex items-center justify-center text-green-500"><Icons.Play /></div>
                        </div>
                    )}

                    <button onClick={() => setShowResetConfirm(true)} className="fixed bottom-6 right-6 bg-white text-red-600 border border-red-100 w-14 h-14 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40 group"><Icons.RotateCcw /><span className="absolute right-full mr-3 bg-slate-900 text-white text-[8px] font-black uppercase tracking-widest px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-xl">Reiniciar Racha</span></button>

                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] w-full max-w-xs shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                                <div className="p-8 text-center">
                                    <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600"><Icons.AlertTriangle /></div>
                                    <h3 className="text-xl font-black text-slate-900 uppercase italic mb-2 tracking-tight">Reiniciar tudo?</h3>
                                    <p className="text-slate-500 text-[11px] font-medium leading-relaxed mb-8">Isso apagará permanentemente todos os jogadores, equipes e o cronômetro. Deseja começar uma nova lista?</p>
                                    <div className="flex flex-col gap-2"><button onClick={resetEverything} className="w-full py-4 bg-red-600 text-white font-black text-[10px] uppercase tracking-widest rounded-2xl hover:bg-red-700 transition-colors shadow-lg shadow-red-200">Sim, limpar tudo</button><button onClick={() => setShowResetConfirm(false)} className="w-full py-4 bg-slate-100 text-slate-500 font-black text-[10px] uppercase tracking-widest rounded-2xl hover:bg-slate-200 transition-colors">Cancelar</button></div>
                                </div>
                            </div>
                        </div>
                    )}

                    {error && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-red-600 text-white px-8 py-4 rounded-2xl shadow-2xl font-black text-[11px] uppercase tracking-widest z-50 fade-out flex items-center gap-3"><Icons.Info /> {error}</div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
